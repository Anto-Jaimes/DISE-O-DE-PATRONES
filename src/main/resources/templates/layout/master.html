<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - GOLAZO">GOLAZO</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.65);
            --card-border: rgba(255, 255, 255, 0.12);
            --navbar-bg: rgba(15, 23, 42, 0.75);
            --input-bg: #090d16;
            --input-border: rgba(255, 255, 255, 0.15);
            --wc-cyan: #00F0FF;
            --wc-green: #00E676;
            --wc-red: #FF1744;
            --wc-gold: #FFD700;
        }

        body.light-mode {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(15, 23, 42, 0.15);
            --navbar-bg: rgba(248, 250, 252, 0.85);
            --input-bg: #ffffff;
            --input-border: rgba(15, 23, 42, 0.2);
            --wc-cyan: #0284c7;
            --wc-green: #15803d;
            --wc-red: #dc2626;
            --wc-gold: #d97706;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.04) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 230, 118, 0.04) 0%, transparent 40%);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Top Navbar */
        .top-navbar {
            background: var(--navbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            color: var(--text-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .navbar-brand {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--wc-cyan) !important;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .nav-link-custom {
            color: var(--text-color) !important;
            opacity: 0.8;
            font-weight: 600;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.08);
            opacity: 1;
            color: var(--wc-cyan) !important;
        }

        /* Custom buttons */
        .btn-bet-cyan {
            background-color: var(--wc-cyan);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn-bet-cyan:hover {
            background-color: #00c7d4;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            color: #000;
        }

        .btn-logout {
            border: 1px solid var(--input-border);
            color: var(--text-color);
            font-weight: 600;
            border-radius: 20px;
            padding: 5px 15px;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: var(--wc-red);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.4);
        }

        .btn-theme-toggle {
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-weight: 600;
            border-radius: 20px;
            padding: 5px 15px;
            transition: all 0.3s;
        }
        .btn-theme-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--wc-cyan);
        }

        /* Light mode specific element adjustments */
        body.light-mode .text-white {
            color: var(--text-color) !important;
        }
        body.light-mode .text-white-50 {
            color: var(--text-muted) !important;
        }
        body.light-mode .bg-dark {
            background-color: #f8fafc !important;
            border-color: #cbd5e1 !important;
        }
        body.light-mode .form-select, body.light-mode .form-control {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border-color: #cbd5e1 !important;
        }
    </style>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg top-navbar sticky-top">
        <div class="container px-4">
            <a class="navbar-brand" href="/"><i class="bi bi-trophy-fill text-warning"></i> GOLAZO</a>
            <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/"><i class="bi bi-house-door-fill"></i> Centro de Apuestas</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <!-- Dark/Light Toggle Button -->
                    <button class="btn btn-theme-toggle btn-sm me-3" onclick="toggleTheme()" id="themeToggleBtn">
                        <i class="bi bi-sun-fill" id="themeIcon"></i> <span id="themeText">Modo Claro</span>
                    </button>

                    <div th:if="${session.usuarioLogueado != null}" class="d-flex align-items-center">
                        <span class="me-3 fw-bold">
                            <i class="bi bi-person-circle text-info"></i> 
                            <span th:text="${session.usuarioLogueado.nombre + ' ' + session.usuarioLogueado.apellido}">Usuario</span>
                            <button th:if="${session.usuarioLogueado.rol == 'ADMIN'}" class="btn btn-sm btn-outline-info ms-2" style="border-radius: 20px; font-size: 0.75rem;" data-bs-toggle="modal" data-bs-target="#editProfileModal"><i class="bi bi-pencil-fill"></i> Editar tu perfil</button>
                        </span>

                        <a href="/logout" class="btn btn-logout btn-sm text-white fw-bold" style="background: var(--wc-red);">
                            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión / Volver al Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-container">
        <main>
            <section layout:fragment="content">
                <!-- Page specific content goes here -->
            </section>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');

            if (!btn || !icon || !text) return;

            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                icon.className = 'bi bi-moon-fill';
                text.innerText = 'Modo Oscuro';
            } else {
                body.classList.remove('light-mode');
                icon.className = 'bi bi-sun-fill';
                text.innerText = 'Modo Claro';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            applyTheme();
        }

        // Apply immediately
        document.addEventListener('DOMContentLoaded', applyTheme);
    </script>
</body>
</html>
