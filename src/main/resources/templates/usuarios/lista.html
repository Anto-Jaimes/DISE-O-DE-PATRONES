<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/master}">
<head>
    <title>Gestión de Jugadores</title>
</head>
<body>

<section layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title mb-0"><i class="bi bi-people-fill text-primary"></i> Gestión de Jugadores</h2>
        <a th:href="@{/usuarios/nueva}" class="btn btn-action rounded-pill px-4">
            <i class="bi bi-plus-circle"></i> Nuevo Jugador
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Código/Usuario</th>
                        <th>Email/Ext</th>
                        <th class="text-end">Saldo</th>
                        <th class="text-center">Apuestas Activas</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Iteramos sobre la lista 'usuarios' que envía el Controller -->
                    <tr th:each="op : ${usuarios}">
                        <td class="fw-bold text-muted" th:text="${op.id}">1</td>
                        <td class="fw-bold" th:text="${op.nombre + ' ' + op.apellido}">Ana Perez</td>
                        <td><span class="badge bg-dark text-white" th:text="${op.codigo}">OP-001</span></td>
                        <td><i class="bi bi-envelope text-muted"></i> <span th:text="${op.email}">101</span></td>
                        <td class="text-end fw-bold text-success">$<span th:text="${#numbers.formatDecimal(op.saldo, 1, 2)}">0.00</span></td>
                        <td class="text-center">
                            <span class="badge rounded-pill bg-success px-3 py-2" th:text="${op.totalTicketApuestas}">0</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/usuarios/editar/{id}(id=${op.id})}" class="btn btn-sm btn-outline-primary" title="Editar">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/usuarios/eliminar/{id}(id=${op.id})}" class="btn btn-sm btn-outline-danger" title="Eliminar" onclick="return confirm('¿Seguro que deseas eliminar a este jugador?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                            No hay jugadores registrados en la plataforma.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

</body>
</html>
